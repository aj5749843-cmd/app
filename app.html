<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>الحقيبة التعليمية التفاعلية — تحصيلي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --blue:#1e6fc0; --blue-l:#e6f1fb;
      --gold:#f5c518; --gold-d:#d4a800;
      --text:#1a1a2e; --text2:#4a4a6a; --text3:#9090b0;
      --border:#e2e5f0; --danger:#dd3344;
      --surface:#fff; --surface2:#f7f8fc;
    }
    html,body{height:100%;}
    body{
      font-family:'Cairo','Segoe UI',sans-serif;
      direction:rtl;
      min-height:100vh;
      display:flex;
      background:#0d1117;
      overflow:hidden;
    }

    /* ── شريط المعلومات الجانبي ── */
    .login-side {
      width:45%;
      background:linear-gradient(160deg,#1a1a2e 0%,#0f3060 50%,#0d2340 100%);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:60px 48px;
      position:relative;
      overflow:hidden;
    }
    .login-side::before{
      content:'';position:absolute;top:-80px;right:-80px;
      width:300px;height:300px;border-radius:50%;
      background:rgba(245,197,24,.06);
    }
    .login-side::after{
      content:'';position:absolute;bottom:-60px;left:-60px;
      width:220px;height:220px;border-radius:50%;
      background:rgba(30,111,192,.12);
    }
    .side-content{position:relative;z-index:1;text-align:center;}

    .side-logo{
      font-size:56px;margin-bottom:20px;
      filter:drop-shadow(0 4px 24px rgba(245,197,24,.3));
    }
    .side-title{
      font-size:30px;font-weight:900;
      color:#fff;line-height:1.3;margin-bottom:8px;
      text-align:center;
    }
    .side-subtitle{
      font-size:16px;font-weight:600;
      color:#f5c518;
      margin-bottom:44px;
      text-align:center;
    }



    /* ── نموذج الدخول ── */
    .login-main{
      flex:1;
      background:#fff;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:48px 40px;
      position:relative;
    }
    .login-main::before{
      content:'';position:absolute;top:0;right:0;bottom:0;
      width:1px;background:linear-gradient(to bottom,transparent,#e2e5f0 20%,#e2e5f0 80%,transparent);
    }

    .form-box{width:100%;max-width:400px;}

    /* Form groups */
    .fg{margin-bottom:20px;}
    .fg-label{
      display:flex;align-items:center;gap:6px;
      font-size:13px;font-weight:700;color:var(--text);
      margin-bottom:8px;
    }
    .fg-label-icon{font-size:15px;}
    .fg-input-wrap{
      display:flex;align-items:center;
      border:2px solid var(--border);
      border-radius:12px;
      background:var(--surface2);
      transition:all .2s;
      overflow:hidden;
    }
    .fg-input-wrap:focus-within{
      border-color:var(--blue);
      background:#fff;
      box-shadow:0 0 0 4px rgba(30,111,192,.08);
    }
    .fg-input-wrap.error{border-color:var(--danger);}
    .fg-prefix{
      padding:0 14px;
      font-size:18px;
      color:var(--text3);
      flex-shrink:0;
      border-left:2px solid var(--border);/* عكس RTL */
    }
    .fg-input-wrap:focus-within .fg-prefix{border-color:var(--blue-l);color:var(--blue);}
    .fg-input{
      flex:1;border:none;background:transparent;
      font-family:'Cairo',sans-serif;font-size:14px;
      color:var(--text);padding:14px 12px;
      outline:none;direction:rtl;
    }
    .fg-input::placeholder{color:var(--text3);}
    .fg-error{
      display:flex;align-items:center;gap:4px;
      font-size:11px;color:var(--danger);
      margin-top:6px;min-height:18px;
      font-weight:600;
    }

    /* Submit */
    .submit-btn{
      width:100%;padding:15px;
      background:linear-gradient(135deg,#1a1a2e 0%,#0f3060 100%);
      color:var(--gold);border:none;border-radius:12px;
      font-family:'Cairo',sans-serif;font-size:15px;font-weight:900;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:all .2s;
      box-shadow:0 4px 20px rgba(15,48,96,.25);
      margin-bottom:14px;
    }
    .submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(15,48,96,.35);}
    .submit-btn:active{transform:translateY(0);}
    .submit-btn .btn-arrow{
      font-size:18px;
      transition:transform .2s;
    }
    .submit-btn:hover .btn-arrow{transform:translateX(-4px);}

    .skip-btn{
      width:100%;padding:11px;
      background:transparent;border:1.5px solid var(--border);
      border-radius:12px;
      font-family:'Cairo',sans-serif;font-size:13px;
      color:var(--text3);cursor:pointer;
      transition:all .2s;
    }
    .skip-btn:hover{border-color:#999;color:var(--text2);background:var(--surface2);}

    /* Responsive */
    .submit-btn.loading{pointer-events:none;opacity:.7;}
    .spinner{
      width:18px;height:18px;border:2px solid rgba(245,197,24,.3);
      border-top-color:var(--gold);border-radius:50%;
      animation:spin .6s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    /* Success state */
    .success-overlay{
      position:absolute;inset:0;
      background:#fff;
      display:none;flex-direction:column;
      align-items:center;justify-content:center;
      z-index:10;
      animation:fadeIn .3s ease;
    }
    .success-overlay.show{display:flex;}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    .success-checkmark{
      width:80px;height:80px;border-radius:50%;
      background:linear-gradient(135deg,#22a855,#16a34a);
      display:flex;align-items:center;justify-content:center;
      font-size:38px;margin-bottom:20px;
      box-shadow:0 8px 32px rgba(34,168,85,.3);
      animation:scaleIn .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes scaleIn{from{transform:scale(0);}to{transform:scale(1);}}
    .success-overlay h2{font-size:22px;font-weight:900;color:var(--text);margin-bottom:6px;}
    .success-overlay p{font-size:13px;color:var(--text3);margin-bottom:24px;}
    .success-bar-wrap{width:200px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
    .success-bar{height:100%;background:var(--blue);border-radius:2px;animation:fillBar 1.5s ease forwards;}
    @keyframes fillBar{from{width:0;}to{width:100%;}}

    /* Responsive */
    @media(max-width:768px){
      body{flex-direction:column;}
      .login-side{width:100%;padding:36px 24px 28px;min-height:auto;}
      .login-main{padding:32px 24px;}
      .login-side::before,.login-side::after{display:none;}
    }
    @media(max-width:480px){
      .side-title{font-size:22px;}
      .steps-bar{display:none;}
    }
  </style>
</head>
<body>

<!-- ── الجانب التعريفي (كحلي) ── -->
<div class="login-side">
  <div class="side-content">
    <div class="side-logo">📚</div>
    <div class="side-title">الحقيبة التعليمية التفاعلية</div>
    <div class="side-subtitle">تحصيلي — بنين وبنات</div>

  </div>
</div>

<!-- ── نموذج الدخول ── -->
<div class="login-main">

  <!-- Success overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-checkmark">✓</div>
    <h2 id="successName">مرحباً!</h2>
    <p>جاري الانتقال للوحة التحكم…</p>
    <div class="success-bar-wrap">
      <div class="success-bar"></div>
    </div>
  </div>

  <div class="form-box">

    <!-- الاسم -->
    <div class="fg">
      <label class="fg-label">
        <span class="fg-label-icon">👤</span> الاسم الكامل
      </label>
      <div class="fg-input-wrap" id="nameWrap">
        <input type="text" id="inputName" class="fg-input"
               placeholder="أدخل اسمك الكامل..."
               maxlength="60" autocomplete="name"
               oninput="onNameInput()" onkeydown="if(event.key==='Enter')document.getElementById('inputEmail').focus()"/>
        <div class="fg-prefix">✏️</div>
      </div>
      <div class="fg-error" id="nameError"></div>
    </div>

    <!-- البريد -->
    <div class="fg">
      <label class="fg-label">
        <span class="fg-label-icon">✉️</span> البريد الإلكتروني
      </label>
      <div class="fg-input-wrap" id="emailWrap">
        <input type="email" id="inputEmail" class="fg-input"
               placeholder="example@email.com"
               maxlength="100" autocomplete="email"
               oninput="onEmailInput()" onkeydown="if(event.key==='Enter')submitLogin()"/>
        <div class="fg-prefix">@</div>
      </div>
      <div class="fg-error" id="emailError"></div>
    </div>

    <!-- Privacy -->
    <div class="privacy-note">
      <span class="pn-icon">🔒</span>
      بياناتك محفوظة على جهازك فقط ولا تُرسل لأي جهة خارجية.
    </div>

    <!-- Submit -->
    <button class="submit-btn" id="submitBtn" onclick="submitLogin()">
      <span id="btnText">ابدأ التدريب</span>
      <span class="btn-arrow" id="btnArrow">←</span>
    </button>

    <button class="skip-btn" onclick="skipLogin()">
      تخطّ وابدأ بدون حفظ البيانات
    </button>
  </div>
</div>

<script>
const STORAGE_KEY = 'tahsili_user_data_v1';

/* تحقق: هل المستخدم مسجل مسبقاً؟ */
(function checkExisting(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data && data.user && data.user.name) {
      /* انتقل مباشرة للتطبيق */
      window.location.href = 'index.html';
    }
  } catch(e){}
})();

/* تحقق لحظي من الاسم */
function onNameInput(){
  const v = document.getElementById('inputName').value.trim();
  const wrap = document.getElementById('nameWrap');
  if(v.length > 0) {
    document.getElementById('nameError').textContent = '';
    wrap.classList.remove('error');
  }
}

/* تحقق لحظي من البريد */
function onEmailInput(){
  const v = document.getElementById('inputEmail').value.trim();
  const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  const wrap = document.getElementById('emailWrap');
  if(v.length > 0 && valid){
    document.getElementById('emailError').textContent = '';
    wrap.classList.remove('error');
  }
}

function submitLogin(){
  const nameVal  = document.getElementById('inputName').value.trim();
  const emailVal = document.getElementById('inputEmail').value.trim();
  let valid = true;

  /* تحقق الاسم */
  if(!nameVal){
    document.getElementById('nameError').textContent = '⚠ الاسم مطلوب';
    document.getElementById('nameWrap').classList.add('error');
    document.getElementById('inputName').focus();
    valid = false;
  }

  /* تحقق البريد */
  if(!emailVal){
    document.getElementById('emailError').textContent = '⚠ البريد الإلكتروني مطلوب';
    document.getElementById('emailWrap').classList.add('error');
    if(valid) document.getElementById('inputEmail').focus();
    valid = false;
  } else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)){
    document.getElementById('emailError').textContent = '⚠ صيغة البريد غير صحيحة';
    document.getElementById('emailWrap').classList.add('error');
    if(valid) document.getElementById('inputEmail').focus();
    valid = false;
  }

  if(!valid) return;

  /* حفظ */
  const userData = { name: nameVal, email: emailVal, joinDate: new Date().toLocaleDateString('ar-SA') };
  try {
    const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    existing.user = userData;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
  } catch(e){}

  /* عرض شاشة النجاح */
  document.getElementById('successName').textContent = `مرحباً، ${nameVal}!`;
  document.getElementById('successOverlay').classList.add('show');

  /* انتقال بعد 1.6 ثانية */
  setTimeout(() => { window.location.href = 'index.html'; }, 1600);
}

function skipLogin(){
  try {
    const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    existing.user = { name: 'ضيف', email: '—', joinDate: '' };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
  } catch(e){}
  window.location.href = 'index.html';
}
</script>
</body>
</html>
